name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze npm
        run: npm install

      - name: Aggiungi piattaforma Android
        run: |
          if [ ! -d "./android" ]; then
            npx cap add android
          fi

      - name: Sincronizza Capacitor
        run: npx cap sync android

      - name: Aggiungi permessi GPS
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$MANIFEST"
          fi

      - name: Sostituisci icona app
        run: |
          sudo apt-get install -y imagemagick -q
          ICON="resources/icon.png"
          R="android/app/src/main/res"
          if [ ! -f "$ICON" ]; then
            echo "Nessuna icona in resources/icon.png, uso default"
            exit 0
          fi
          echo "Genero icone da $ICON..."
          convert "$ICON" -resize 48x48   "$R/mipmap-mdpi/ic_launcher.png"
          convert "$ICON" -resize 48x48   "$R/mipmap-mdpi/ic_launcher_round.png"
          convert "$ICON" -resize 48x48   "$R/mipmap-mdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 72x72   "$R/mipmap-hdpi/ic_launcher.png"
          convert "$ICON" -resize 72x72   "$R/mipmap-hdpi/ic_launcher_round.png"
          convert "$ICON" -resize 72x72   "$R/mipmap-hdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 96x96   "$R/mipmap-xhdpi/ic_launcher.png"
          convert "$ICON" -resize 96x96   "$R/mipmap-xhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 96x96   "$R/mipmap-xhdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 144x144 "$R/mipmap-xxhdpi/ic_launcher.png"
          convert "$ICON" -resize 144x144 "$R/mipmap-xxhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 144x144 "$R/mipmap-xxhdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 192x192 "$R/mipmap-xxxhdpi/ic_launcher.png"
          convert "$ICON" -resize 192x192 "$R/mipmap-xxxhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 192x192 "$R/mipmap-xxxhdpi/ic_launcher_foreground.png"
          convert -size 192x192 xc:"#1565C0" "$R/mipmap-xxxhdpi/ic_launcher_background.png"
          convert -size 144x144 xc:"#1565C0" "$R/mipmap-xxhdpi/ic_launcher_background.png"
          convert -size 96x96   xc:"#1565C0" "$R/mipmap-xhdpi/ic_launcher_background.png"
          convert -size 72x72   xc:"#1565C0" "$R/mipmap-hdpi/ic_launcher_background.png"
          convert -size 48x48   xc:"#1565C0" "$R/mipmap-mdpi/ic_launcher_background.png"
          rm -rf "$R/mipmap-anydpi-v26"
          mkdir -p "$R/mipmap-anydpi-v26"
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' '    <background android:drawable="@mipmap/ic_launcher_background"/>' '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' '</adaptive-icon>' > "$R/mipmap-anydpi-v26/ic_launcher.xml"
          cp "$R/mipmap-anydpi-v26/ic_launcher.xml" "$R/mipmap-anydpi-v26/ic_launcher_round.xml"
          echo "Icone sostituite con successo"

      - name: Rendi eseguibile Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Carica APK come artifact
        uses: actions/upload-artifact@v4
        with:
          name: carburanti-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
