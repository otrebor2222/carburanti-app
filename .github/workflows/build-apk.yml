name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze npm
        run: npm install

      - name: Aggiungi piattaforma Android
        run: |
          if [ ! -d "./android" ]; then
            npx cap add android
          fi

      - name: Sincronizza Capacitor
        run: npx cap sync android

      - name: Aggiungi permessi GPS nel manifest Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$MANIFEST"
            echo "Permessi GPS aggiunti"
          else
            echo "Permessi GPS già presenti"
          fi

      - name: Rendi eseguibile Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Carica APK come artifact
        uses: actions/upload-artifact@v4
        with:
          name: carburanti-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
