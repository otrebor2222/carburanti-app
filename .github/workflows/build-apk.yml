name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze npm
        run: npm install

      - name: Aggiungi piattaforma Android
        run: |
          if [ ! -d "./android" ]; then
            npx cap add android
          fi

      - name: Sincronizza Capacitor
        run: npx cap sync android

      - name: Aggiungi permessi GPS nel manifest Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <application|' "$MANIFEST"
          fi

      - name: Sostituisci icona app
        run: |
          sudo apt-get install -y imagemagick -q
          ICON="resources/icon.png"
          if [ ! -f "$ICON" ]; then
            echo "ERRORE: resources/icon.png non trovato"
            exit 1
          fi
          echo "Icona trovata, genero tutte le dimensioni..."
          R="android/app/src/main/res"

          # Genera tutte le dimensioni standard
          convert "$ICON" -resize 48x48     "$R/mipmap-mdpi/ic_launcher.png"
          convert "$ICON" -resize 48x48     "$R/mipmap-mdpi/ic_launcher_round.png"
          convert "$ICON" -resize 48x48     "$R/mipmap-mdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 72x72     "$R/mipmap-hdpi/ic_launcher.png"
          convert "$ICON" -resize 72x72     "$R/mipmap-hdpi/ic_launcher_round.png"
          convert "$ICON" -resize 72x72     "$R/mipmap-hdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 96x96     "$R/mipmap-xhdpi/ic_launcher.png"
          convert "$ICON" -resize 96x96     "$R/mipmap-xhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 96x96     "$R/mipmap-xhdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 144x144   "$R/mipmap-xxhdpi/ic_launcher.png"
          convert "$ICON" -resize 144x144   "$R/mipmap-xxhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 144x144   "$R/mipmap-xxhdpi/ic_launcher_foreground.png"
          convert "$ICON" -resize 192x192   "$R/mipmap-xxxhdpi/ic_launcher.png"
          convert "$ICON" -resize 192x192   "$R/mipmap-xxxhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 192x192   "$R/mipmap-xxxhdpi/ic_launcher_foreground.png"

          # Rimuovi le cartelle anydpi-v26 che usano XML con layer
          # e sostituisci con icone statiche semplici
          rm -rf "$R/mipmap-anydpi-v26"

          # Ricrea mipmap-anydpi-v26 con XML che punta direttamente all'icona PNG
          mkdir -p "$R/mipmap-anydpi-v26"
          cat > "$R/mipmap-anydpi-v26/ic_launcher.xml" << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@mipmap/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
XMLEOF
          cat > "$R/mipmap-anydpi-v26/ic_launcher_round.xml" << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@mipmap/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
XMLEOF

          # Genera anche il background (sfondo bianco)
          convert -size 192x192 xc:white "$R/mipmap-xxxhdpi/ic_launcher_background.png"
          convert -size 144x144 xc:white "$R/mipmap-xxhdpi/ic_launcher_background.png"
          convert -size 96x96   xc:white "$R/mipmap-xhdpi/ic_launcher_background.png"
          convert -size 72x72   xc:white "$R/mipmap-hdpi/ic_launcher_background.png"
          convert -size 48x48   xc:white "$R/mipmap-mdpi/ic_launcher_background.png"

          echo "Tutte le icone sostituite con successo!"
          ls -la "$R/mipmap-xxxhdpi/"

      - name: Rendi eseguibile Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Carica APK come artifact
        uses: actions/upload-artifact@v4
        with:
          name: carburanti-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
