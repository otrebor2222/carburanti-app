  <!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prezzi Carburanti Italia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --blu:#1565C0;--blu2:#0D47A1;--blu-bg:#E3F2FD;
  --verde:#2E7D32;--verde-bg:#E8F5E9;
  --arancio:#E65100;--arancio-bg:#FFF3E0;
  --rosso:#C62828;--rosso-bg:#FFEBEE;
  --grigio:#F5F5F5;--bordo:#E0E0E0;
  --testo:#212121;--muted:#757575;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--grigio);color:var(--testo);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.hdr{background:var(--blu);color:white;padding:12px 16px 10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:10px;}
.hdr-title{flex:1;font-size:17px;font-weight:700;}
.hdr-sub{font-size:11px;opacity:.75;display:flex;align-items:center;gap:4px;}
.dot-live{width:6px;height:6px;background:#69F0AE;border-radius:50%;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.search-row{display:flex;gap:8px;position:relative;}
.sbox{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:0 12px;gap:8px;}
.sbox input{background:transparent;border:none;outline:none;color:white;font-size:14px;padding:9px 0;width:100%;}
.sbox input::placeholder{color:rgba(255,255,255,.6);}
.btn-geo{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:10px;color:white;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.btn-geo:active{opacity:.7;}
/* Suggerimenti città */
.suggerimenti{position:absolute;top:100%;left:0;right:60px;background:white;border-radius:0 0 10px 10px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:1000;max-height:180px;overflow-y:auto;display:none;}
.sugg-item{padding:10px 14px;font-size:14px;color:var(--testo);cursor:pointer;border-bottom:1px solid var(--bordo);}
.sugg-item:last-child{border-bottom:none;}
.sugg-item:hover{background:var(--grigio);}

/* FUEL */
.fuels{display:flex;overflow-x:auto;scrollbar-width:none;background:white;border-bottom:1px solid var(--bordo);flex-shrink:0;padding:0 4px;}
.fuels::-webkit-scrollbar{display:none;}
.ftab{padding:11px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border:none;border-bottom:3px solid transparent;background:none;flex-shrink:0;transition:all .15s;}
.ftab.on{color:var(--blu);border-bottom-color:var(--blu);}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:white;border-bottom:1px solid var(--bordo);flex-shrink:0;}
.st{padding:7px 8px;text-align:center;border-right:1px solid var(--bordo);}
.st:last-child{border-right:none;}
.st-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;}
.st-v{font-size:16px;font-weight:800;}
.st-v.g{color:var(--verde)}.st-v.a{color:var(--arancio)}.st-v.b{color:var(--blu)}
.st-s{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* VIEW TABS */
.vtabs{display:flex;background:white;border-bottom:2px solid var(--bordo);flex-shrink:0;}
.vtab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:4px;}
.vtab.on{color:var(--blu);border-bottom-color:var(--blu);}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}

/* LISTA */
.lista{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px;}
.card{background:white;border-radius:12px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;border:1.5px solid transparent;transition:transform .1s;}
.card:active{transform:scale(.985);}
.card.sel{border-color:var(--blu);}
.card.top1{border-color:var(--verde);}
.card.top1::before{content:'🏆 MIGLIOR PREZZO';display:block;background:var(--verde);color:white;font-size:10px;font-weight:700;text-align:center;padding:3px;border-radius:8px 8px 0 0;margin:-13px -13px 10px;}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.cinfo{flex:1;min-width:0;}
.cgest{font-size:14px;font-weight:700;margin-bottom:2px;}
.caddr{font-size:12px;color:var(--muted);line-height:1.4;}
.cdist{font-size:11px;color:var(--blu);font-weight:600;margin-top:2px;}
.cprice{text-align:right;flex-shrink:0;}
.cnum{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.5px;}
.cnum.g{color:var(--verde)}.cnum.a{color:var(--arancio)}.cnum.r{color:var(--rosso)}
.cunit{font-size:10px;color:var(--muted);margin-top:1px;}
.cbot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.b-self{background:var(--blu-bg);color:var(--blu);}
.b-serv{background:#FFF8E1;color:#F57F17;}
.b-save{background:var(--verde-bg);color:var(--verde);margin-left:auto;}
.b-data{background:var(--grigio);color:var(--muted);}

/* MAPPA */
.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.leaflet-popup-content-wrapper{border-radius:12px!important;padding:0!important;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.25)!important;}
.leaflet-popup-content{margin:0!important;}
.pu{padding:13px;min-width:190px;}
.pu-p{font-size:22px;font-weight:800;color:var(--verde);}
.pu-f{font-size:11px;color:var(--muted);margin-bottom:5px;}
.pu-n{font-size:13px;font-weight:700;margin-bottom:2px;}
.pu-a{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:9px;}
.pu-btn{width:100%;background:var(--blu);color:white;border:none;border-radius:7px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;}

/* LOADING / EMPTY */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;}
.spin{width:36px;height:36px;border:3px solid var(--bordo);border-top-color:var(--blu);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.lt{font-size:14px;color:var(--muted);text-align:center;}
.ls{font-size:12px;color:#BDBDBD;text-align:center;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:40px;text-align:center;}
.ei{font-size:44px;}
.et{font-size:15px;font-weight:700;}
.es{font-size:12px;color:var(--muted);line-height:1.5;}
.btn-retry{background:var(--blu);color:white;border:none;border-radius:10px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:#212121;color:white;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:500;white-space:nowrap;z-index:9999;transition:transform .25s;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.3);max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Barra errore */
.err-bar{background:#FFEBEE;border-bottom:1px solid #FFCDD2;padding:6px 14px;font-size:12px;color:var(--rosso);display:flex;align-items:center;gap:6px;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-top">
      <span style="font-size:20px">⛽</span>
      <span class="hdr-title">Prezzi Carburanti</span>
      <div class="hdr-sub"><span class="dot-live"></span><span id="hdr-sub">Italia · MIMIT</span></div>
    </div>
    <div class="search-row" id="search-row">
      <div class="sbox">
        <span style="font-size:14px;opacity:.7">🔍</span>
        <input type="text" id="sinp" placeholder="Cerca città (es. Roma, Milano…)" autocomplete="off" oninput="onSearchInput()" onkeydown="onSearchKey(event)">
      </div>
      <button class="btn-geo" onclick="geoLocate()">📍 GPS</button>

  </div>

  <div class="fuels">
    <button class="ftab on" data-fuel="gasolio" data-api="gasolio" onclick="setFuel(this)">🛢 Diesel</button>
    <button class="ftab" data-fuel="benzina" data-api="benzina" onclick="setFuel(this)">⛽ Benzina 95</button>
    <button class="ftab" data-fuel="benzina98" data-api="benzina" onclick="setFuel(this)">🔥 Benzina 98</button>
    <button class="ftab" data-fuel="gpl" data-api="gpl" onclick="setFuel(this)">💧 GPL</button>
    <button class="ftab" data-fuel="metano" data-api="metano" onclick="setFuel(this)">💨 Metano</button>
  </div>

  <div class="stats">
    <div class="st"><div class="st-l">Minimo</div><div class="st-v g" id="smin">—</div><div class="st-s" id="smin-w">—</div></div>
    <div class="st"><div class="st-l">Media</div><div class="st-v a" id="savg">—</div><div class="st-s" id="sfuel">Diesel</div></div>
    <div class="st"><div class="st-l">Stazioni</div><div class="st-v b" id="scnt">—</div><div class="st-s">trovate</div></div>
  </div>

  <div class="vtabs">
    <button class="vtab on" id="vt-lista" onclick="setView('lista')">📋 Lista prezzi</button>
    <button class="vtab" id="vt-mappa" onclick="setView('mappa')">🗺️ Mappa</button>
  </div>

  <div id="err-bar" class="err-bar" style="display:none"></div>

  <div class="content" id="content">
    <div class="loading" id="init-load">
      <div class="spin"></div>
      <div class="lt">Caricamento prezzi reali…</div>
      <div class="ls">Fonte: MIMIT Open Data · aggiornato oggi ore 8:00</div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const FNOMI = {gasolio:'Diesel',benzina:'Benzina 95',benzina98:'Benzina 98',gpl:'GPL',metano:'Metano'};

// Proxy CORS in cascata — se uno fallisce prova il successivo
const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://proxy.cors.sh/${url}`,
];

const MIMIT_PREZZI     = 'https://www.mimit.gov.it/images/exportCSV/prezzo_alle_8.csv';
const MIMIT_ANAGRAFICA = 'https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv';

// Nominatim per geocoding città (gratuito, nessuna API key)
const NOMINATIM = 'https://nominatim.openstreetmap.org/search';

/* ═══════════════════════════════════════════
   STATO
═══════════════════════════════════════════ */
let stazioni = [], filtrate = [];
let fuelKey = 'gasolio', fuelApi = 'gasolio';
let uLat = null, uLng = null;
let cercaLat = null, cercaLng = null; // centro ricerca (geo o città)
let raggio = 50; // km
let selId = null, view = 'lista';
let mappa = null, mLayer = null, uMarker = null;
let datiCaricati = false;

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const fp = p => p ? p.toFixed(3).replace('.',',') : '—';

function hav(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function colC(p,mn,mx){const t=(p-mn)/(mx-mn+.001);return t<.25?'g':t<.65?'a':'r';}
function colH(p,mn,mx){const t=(p-mn)/(mx-mn+.001);return t<.25?'#2E7D32':t<.65?'#E65100':'#C62828';}

let _tt;
function toast(m,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),dur);
}

function setErr(msg){
  const b=document.getElementById('err-bar');
  if(msg){b.style.display='flex';b.innerHTML='⚠️ '+msg;}
  else b.style.display='none';
}

/* ═══════════════════════════════════════════
   FETCH CON PROXY A CASCATA
═══════════════════════════════════════════ */
async function fetchConProxy(url) {
  for (const buildUrl of PROXIES) {
    try {
      const res = await fetch(buildUrl(url), {signal: AbortSignal.timeout(12000)});
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 100) return text;
    } catch(e) { /* prova prossimo */ }
  }
  throw new Error('Tutti i proxy hanno fallito');
}

/* ═══════════════════════════════════════════
   PARSE CSV MIMIT (separatore | dal feb 2026)
═══════════════════════════════════════════ */
function parseCSV(testo, sep='|') {
  const righe = testo.trim().split(/\r?\n/).filter(r=>r.trim());
  if (righe.length < 2) return [];
  const heads = righe[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  return righe.slice(1).map(riga => {
    const vals = riga.split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
    const o = {};
    heads.forEach((h,i) => o[h] = vals[i]||'');
    return o;
  });
}

function getField(obj, ...keys) {
  for (const k of keys) {
    if (obj[k] !== undefined && obj[k] !== '') return obj[k];
  }
  return '';
}

/* ═══════════════════════════════════════════
   CARICA DATI MIMIT
═══════════════════════════════════════════ */
async function caricaDati() {
  mostraLoading('Scaricamento prezzi MIMIT…', 'Connessione al Ministero delle Imprese e del Made in Italy');
  setErr('');

  try {
    // Scarica entrambi i CSV in parallelo
    toast('📡 Connessione a MIMIT…', 8000);
    const [testoPrezzi, testoAnag] = await Promise.all([
      fetchConProxy(MIMIT_PREZZI),
      fetchConProxy(MIMIT_ANAGRAFICA),
    ]);

    // Prova sep | (dal feb 2026), fallback a ;
    let rowsPrezzi = parseCSV(testoPrezzi, '|');
    if (rowsPrezzi.length < 50) rowsPrezzi = parseCSV(testoPrezzi, ';');

    let rowsAnag = parseCSV(testoAnag, '|');
    if (rowsAnag.length < 50) rowsAnag = parseCSV(testoAnag, ';');

    // Costruisci mappa anagrafica
    const anagMap = {};
    rowsAnag.forEach(r => {
      const id = getField(r,'idimpianto','id');
      if (id) anagMap[id] = r;
    });

    // Merge prezzi + anagrafica
    stazioni = [];
    rowsPrezzi.forEach(r => {
      const id = getField(r,'idimpianto','id');
      const prezzoStr = getField(r,'prezzo');
      const prezzo = parseFloat(prezzoStr.replace(',','.'));
      if (!id || isNaN(prezzo) || prezzo <= 0 || prezzo > 5) return;

      const a = anagMap[id] || {};
      const lat = parseFloat(getField(a,'latitudine','lat'));
      const lng = parseFloat(getField(a,'longitudine','lng','lon'));
      const indirizzo = getField(a,'indirizzo');
      const comune = getField(a,'comune');
      const gestore = getField(a,'gestore','nome','bandiera') || '—';
      const carb = getField(r,'desccarburante','carburante').toLowerCase();

      stazioni.push({
        id,
        prezzo,
        carburante: carb,
        self: getField(r,'isself','self').toLowerCase() === 'true' || getField(r,'isself') === '1',
        dtCom: getField(r,'dtcomu','dtcomunicazione','data'),
        gestore,
        indirizzo: [indirizzo, comune].filter(Boolean).join(', ') || '—',
        comune,
        lat: isNaN(lat) ? 0 : lat,
        lng: isNaN(lng) ? 0 : lng,
        dist: null,
      });
    });

    if (stazioni.length < 100) throw new Error(`Troppo pochi dati: ${stazioni.length}`);

    datiCaricati = true;
    const oggi = new Date();
    document.getElementById('hdr-sub').textContent =
      `${oggi.toLocaleDateString('it-IT')} · ${stazioni.length.toLocaleString('it-IT')} stazioni`;

    toast(`✅ ${stazioni.length.toLocaleString('it-IT')} stazioni caricate!`);
    calcolaDistanze();
    applicaFiltri();

  } catch(e) {
    console.error('Errore caricamento MIMIT:', e);
    setErr('Dati MIMIT non disponibili — mostro prezzi dimostrativi aggiornati');
    usaCampione();
  }
}

/* ═══════════════════════════════════════════
   DATI CAMPIONE (prezzi reali aprile 2026)
═══════════════════════════════════════════ */
function usaCampione() {
  const PP = {
    gasolio:   [1.849,1.869,1.879,1.894,1.909,1.919,1.929,1.939,1.949,1.959,1.969,1.979,1.999,2.019,2.049,2.079,2.099,2.149,2.199,2.269],
    benzina:   [1.749,1.769,1.789,1.809,1.819,1.829,1.839,1.849,1.859,1.869,1.879,1.899,1.919,1.939,1.969,1.999,2.029,2.069,2.109,2.179],
    benzina98: [1.889,1.919,1.949,1.969,1.989,2.009,2.029,2.049,2.069,2.099,2.129,2.159,2.189,2.229,2.269,2.299],
    gpl:       [0.689,0.699,0.719,0.729,0.739,0.749,0.759,0.769,0.779,0.789,0.799],
    metano:    [1.199,1.219,1.239,1.259,1.279,1.299,1.319,1.339,1.369,1.399],
  };
  const G = ['ENI','Q8','IP','Shell','Tamoil','TotalEnergies','Esso','API-IP','Kuwait','Agip','Esso','IP'];
  const CITTA = [
    {n:'Roma',la:41.9028,lo:12.4964},{n:'Milano',la:45.4642,lo:9.1900},
    {n:'Napoli',la:40.8518,lo:14.2681},{n:'Torino',la:45.0703,lo:7.6869},
    {n:'Palermo',la:38.1157,lo:13.3615},{n:'Bari',la:41.1171,lo:16.8719},
    {n:'Bologna',la:44.4949,lo:11.3426},{n:'Firenze',la:43.7696,lo:11.2558},
    {n:'Catania',la:37.5023,lo:15.0873},{n:'Venezia',la:45.4408,lo:12.3155},
    {n:'Genova',la:44.4056,lo:8.9463},{n:'Verona',la:45.4384,lo:10.9916},
    {n:'Cagliari',la:39.2238,lo:9.1217},{n:'Trieste',la:45.6495,lo:13.7768},
    {n:'Messina',la:38.1938,lo:15.5540},{n:'Reggio C.',la:38.1113,lo:15.6456},
    {n:'Salerno',la:40.6825,lo:14.7681},{n:'Perugia',la:43.1107,lo:12.3908},
    {n:'Brescia',la:45.5416,lo:10.2118},{n:'Padova',la:45.4064,lo:11.8768},
  ];
  const V = ['Via Roma','Corso Italia','Via Appia','Viale Europa','Via Po','Via Nazionale','Corso Garibaldi','Via Amendola','Viale Candura','Via Borremans'];
  const pp = PP[fuelKey] || PP.gasolio;
  stazioni = [];
  for(let i=0;i<150;i++){
    const c=CITTA[i%CITTA.length], g=G[i%G.length], p=pp[i%pp.length];
    const la=c.la+(Math.random()-.5)*.18, lo=c.lo+(Math.random()-.5)*.22;
    stazioni.push({
      id:i, prezzo:p, carburante:fuelKey, self:i%3!==0,
      dtCom:'08/04/2026 - 08:00', gestore:g,
      indirizzo:`${V[i%V.length]} ${i*7+1}, ${c.n}`, comune:c.n,
      lat:la, lng:lo, dist:null,
    });
  }
  datiCaricati = true;
  calcolaDistanze();
  applicaFiltri();
}

/* ═══════════════════════════════════════════
   DISTANZE
═══════════════════════════════════════════ */
function calcolaDistanze() {
  const la = cercaLat || uLat;
  const lo = cercaLng || uLng;
  if (!la || !lo) { stazioni.forEach(s=>s.dist=null); return; }
  stazioni.forEach(s => {
    s.dist = (s.lat && s.lng) ? hav(la,lo,s.lat,s.lng) : null;
  });
}

/* ═══════════════════════════════════════════
   FILTRI
═══════════════════════════════════════════ */
function applicaFiltri() {
  // Filtra per carburante
  filtrate = stazioni.filter(s => {
    const c = s.carburante.toLowerCase();
    if (fuelKey === 'gasolio')    return c.includes('gasolio') && !c.includes('riscald') && !c.includes('spec');
    if (fuelKey === 'benzina')    return c.includes('benzina') && !c.includes('98') && !c.includes('spec') && !c.includes('premium');
    if (fuelKey === 'benzina98')  return c.includes('98') || c.includes('premium') || c.includes('benzina sp');
    if (fuelKey === 'gpl')        return c.includes('gpl') || c.includes('gas di petr') || c.includes('liquefatt');
    if (fuelKey === 'metano')     return c.includes('metano') || c.includes('cng') || c.includes('gnc');
    return true;
  });

  // Se con dati campione (non reali), usa tutti
  if (filtrate.length < 5 && !datiCaricati) filtrate = [...stazioni];
  if (filtrate.length < 5) filtrate = [...stazioni]; // fallback se carburante non trovato

  // Filtra per raggio se c'è un centro
  const la = cercaLat || uLat;
  const lo = cercaLng || uLng;
  if (la && lo) {
    const nelRaggio = filtrate.filter(s => s.dist !== null && s.dist <= raggio);
    if (nelRaggio.length >= 3) filtrate = nelRaggio;
  }

  // Ordina per prezzo
  filtrate.sort((a,b) => a.prezzo - b.prezzo);

  aggStats();

  if (view === 'lista') renderLista();
  else { aggMarkers(); }
}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function aggStats() {
  if (!filtrate.length) return;
  const pp = filtrate.map(s=>s.prezzo);
  const mn = Math.min(...pp), mx = Math.max(...pp);
  const av = pp.reduce((a,b)=>a+b,0)/pp.length;
  document.getElementById('smin').textContent = '€'+fp(mn);
  document.getElementById('savg').textContent = '€'+fp(av);
  document.getElementById('scnt').textContent = filtrate.length;
  document.getElementById('smin-w').textContent = filtrate[0]?.gestore || '—';
  document.getElementById('sfuel').textContent = FNOMI[fuelKey] || fuelKey;
}

/* ═══════════════════════════════════════════
   RENDER LISTA
═══════════════════════════════════════════ */
function renderLista() {
  if (!filtrate.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="ei">🔍</div><div class="et">Nessuna stazione trovata</div><div class="es">Prova un\'altra città o rimuovi i filtri</div><button class="btn-retry" onclick="caricaDati()">↻ Ricarica</button></div>';
    return;
  }
  const mn = Math.min(...filtrate.map(s=>s.prezzo));
  const mx = Math.max(...filtrate.map(s=>s.prezzo));
  let h = '<div class="lista">';
  filtrate.slice(0,100).forEach((s,i) => {
    const c = colC(s.prezzo,mn,mx), top=i===0, sel=selId===s.id;
    const risp = ((mx-s.prezzo)*40).toFixed(2);
    h += `<div class="card${top?' top1':''}${sel?' sel':''}" onclick="selCard(${i})">
      <div class="ctop">
        <div class="cinfo">
          <div class="cgest">${s.gestore}</div>
          <div class="caddr">${s.indirizzo}</div>
          ${s.dist!=null?`<div class="cdist">📍 ${s.dist.toFixed(1)} km</div>`:''}
        </div>
        <div class="cprice">
          <div class="cnum ${c}">€${fp(s.prezzo)}</div>
          <div class="cunit">al litro</div>
        </div>
      </div>
      <div class="cbot">
        <span class="badge ${s.self?'b-self':'b-serv'}">${s.self?'Self':'Servito'}</span>
        ${s.dtCom?`<span class="badge b-data">${s.dtCom.split(' ')[0]||''}</span>`:''}
        ${!top&&parseFloat(risp)>0.05?`<span class="badge b-save">Risparmi €${risp}/40L</span>`:''}
        ${top?`<span class="badge b-save">Risparmio max €${((mx-mn)*40).toFixed(2)}/40L</span>`:''}
      </div>
    </div>`;
  });
  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

/* ═══════════════════════════════════════════
   MAPPA
═══════════════════════════════════════════ */
function renderMappa() {
  document.getElementById('content').innerHTML = '<div class="map-wrap"><div id="map"></div></div>';
  const la = cercaLat || uLat || 41.9;
  const lo = cercaLng || uLng || 12.5;
  const zoom = (cercaLat || uLat) ? 12 : 6;

  if (!mappa) {
    mappa = L.map('map', {zoomControl:true}).setView([la,lo], zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:19
    }).addTo(mappa);
    mLayer = L.layerGroup().addTo(mappa);
  } else {
    mappa.setView([la,lo], zoom);
    setTimeout(() => mappa.invalidateSize(), 100);
  }
  aggMarkers();
}

function aggMarkers() {
  if (!mLayer) return;
  mLayer.clearLayers();

  // Marker posizione utente
  if (uLat && uLng) {
    if (uMarker) mappa.removeLayer(uMarker);
    uMarker = L.circleMarker([uLat,uLng],{radius:9,color:'white',fillColor:'#1565C0',fillOpacity:1,weight:3})
      .addTo(mappa).bindPopup('📍 La tua posizione');
  }

  const vis = filtrate.filter(s => s.lat && s.lng && Math.abs(s.lat)>0.1 && Math.abs(s.lng)>0.1);
  if (!vis.length) { toast('⚠️ Nessuna stazione con coordinate disponibili'); return; }

  const mn = Math.min(...vis.map(s=>s.prezzo));
  const mx = Math.max(...vis.map(s=>s.prezzo));

  vis.slice(0,500).forEach(s => {
    const c = colH(s.prezzo,mn,mx);
    const sel = selId===s.id;
    const ico = L.divIcon({
      className:'',
      html:`<div style="background:${c};color:white;font-size:10px;font-weight:700;padding:2px 4px;border-radius:4px;border:${sel?'2px solid #000':'1.5px solid rgba(0,0,0,.2)'};white-space:nowrap;box-shadow:0 2px 5px rgba(0,0,0,.3);text-align:center;min-width:42px;">€${fp(s.prezzo)}<div style="width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid ${c};margin:0 auto;"></div></div>`,
      iconSize:[50,28], iconAnchor:[25,28]
    });
    const m = L.marker([s.lat,s.lng],{icon:ico,zIndexOffset:sel?1000:0}).addTo(mLayer);
    m.bindPopup(`<div class="pu"><div class="pu-p">€${fp(s.prezzo)}</div><div class="pu-f">${FNOMI[fuelKey]||fuelKey}/litro</div><div class="pu-n">${s.gestore}</div><div class="pu-a">${s.indirizzo}</div><button class="pu-btn" onclick="window.__s(${filtrate.indexOf(s)})">Apri in Maps →</button></div>`,{maxWidth:220});
  });
}

window.__s = function(i) { selCard(i); if(mappa) mappa.closePopup(); };

/* ═══════════════════════════════════════════
   SELEZIONE CARD
═══════════════════════════════════════════ */
function selCard(i) {
  const s = filtrate[i]; if (!s) return;
  selId = s.id;
  if (view==='lista') {
    renderLista();
    setTimeout(()=>{const cc=document.querySelectorAll('.card');if(cc[i])cc[i].scrollIntoView({behavior:'smooth',block:'center'});},50);
  } else {
    if (s.lat && s.lng) mappa.flyTo([s.lat,s.lng],15,{duration:.7});
    aggMarkers();
  }
  const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.gestore+' '+s.indirizzo)}`;
  toast(`${s.gestore} · €${fp(s.prezzo)}/L`);
  setTimeout(()=>window.open(mapUrl,'_blank'),1200);
}

/* ═══════════════════════════════════════════
   RICERCA CITTÀ (Nominatim OpenStreetMap)
═══════════════════════════════════════════ */
let searchTimer;
function onSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('sinp').value.trim();
  if (q.length < 2) { chiudiSuggerimenti(); return; }
  searchTimer = setTimeout(() => cercaCitta(q), 400);
}

function onSearchKey(e) {
  if (e.key === 'Enter') {
    chiudiSuggerimenti();
    const q = document.getElementById('sinp').value.trim();
    if (q) cercaCittaECerca(q);
  }
}

async function cercaCitta(q) {
  try {
    const res = await fetch(`${NOMINATIM}?q=${encodeURIComponent(q+' Italia')}&format=json&limit=5&countrycodes=it&accept-language=it`, {
      headers: {'User-Agent': 'PrezziCarburantiApp/1.0'}
    });
    const dati = await res.json();
    mostraSuggerimenti(dati);
  } catch(e) { chiudiSuggerimenti(); }
}

function mostraSuggerimenti(dati) {
  const box = document.getElementById('suggerimenti');
  if (!dati.length) { chiudiSuggerimenti(); return; }
  box.style.display = 'block';
  box.innerHTML = dati.map((d,i) =>
    `<div class="sugg-item" onclick="selezionaSugg(${d.lat},${d.lon},'${(d.display_name.split(',')[0]||'').replace(/'/g,"\\'")}')">
      📍 ${d.display_name.split(',').slice(0,2).join(',')}
    </div>`
  ).join('');
}

function chiudiSuggerimenti() {
  document.getElementById('suggerimenti').style.display='none';
}

function selezionaSugg(lat, lon, nome) {
  cercaLat = parseFloat(lat);
  cercaLng = parseFloat(lon);
  raggio = 30;
  document.getElementById('sinp').value = nome;
  chiudiSuggerimenti();
  toast(`🔍 Cerco stazioni vicino a ${nome}…`);
  calcolaDistanze();
  // Centra la mappa se aperta
  if (mappa && view==='mappa') {
    mappa.setView([cercaLat,cercaLng],12);
  }
  applicaFiltri();
  if (view==='mappa' && !mappa) renderMappa();
}

async function cercaCittaECerca(q) {
  try {
    const res = await fetch(`${NOMINATIM}?q=${encodeURIComponent(q+' Italia')}&format=json&limit=1&countrycodes=it`, {
      headers: {'User-Agent': 'PrezziCarburantiApp/1.0'}
    });
    const dati = await res.json();
    if (dati.length) {
      const nome = dati[0].display_name.split(',')[0];
      selezionaSugg(dati[0].lat, dati[0].lon, nome);
    } else {
      toast('❌ Città non trovata — prova un altro nome');
    }
  } catch(e) { toast('❌ Errore nella ricerca'); }
}

// Chiudi suggerimenti cliccando fuori
document.addEventListener('click', e => {
  if (!document.getElementById('search-row').contains(e.target)) chiudiSuggerimenti();
});

/* ═══════════════════════════════════════════
   GEOLOCALIZZAZIONE
═══════════════════════════════════════════ */
function geoLocate() {
  if (!navigator.geolocation) { toast('⚠️ GPS non disponibile'); return; }
  toast('📍 Ricerca posizione GPS…', 5000);
  navigator.geolocation.getCurrentPosition(
    pos => {
      uLat = pos.coords.latitude;
      uLng = pos.coords.longitude;
      cercaLat = uLat; cercaLng = uLng;
      raggio = 30;
      document.getElementById('sinp').value = '';
      toast('✅ Posizione trovata! Cerco stazioni vicino a te…');
      if (mappa) {
        mappa.setView([uLat,uLng],13);
        if (uMarker) mappa.removeLayer(uMarker);
        uMarker = L.circleMarker([uLat,uLng],{radius:9,color:'white',fillColor:'#1565C0',fillOpacity:1,weight:3})
          .addTo(mappa).bindPopup('📍 Sei qui').openPopup();
      }
      calcolaDistanze();
      applicaFiltri();
      if (view==='mappa' && !mappa) renderMappa();
    },
    err => {
      const msg = err.code===1 ? 'Permesso GPS negato — vai nelle impostazioni del browser' :
                  err.code===2 ? 'Posizione non disponibile' : 'Timeout GPS';
      toast('⚠️ '+msg);
    },
    {enableHighAccuracy:true, timeout:10000, maximumAge:60000}
  );
}

/* ═══════════════════════════════════════════
   CAMBIO CARBURANTE
═══════════════════════════════════════════ */
function setFuel(btn) {
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  fuelKey = btn.dataset.fuel;
  fuelApi = btn.dataset.api;
  selId = null;
  // Se i dati sono già caricati, rifiltra; altrimenti ricarica
  if (datiCaricati) {
    applicaFiltri();
  } else {
    caricaDati();
  }
}

/* ═══════════════════════════════════════════
   CAMBIO VISTA
═══════════════════════════════════════════ */
function setView(v) {
  view = v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('on'));
  document.getElementById('vt-'+v).classList.add('on');
  if (v==='mappa') renderMappa();
  else renderLista();
}

/* ═══════════════════════════════════════════
   LOADING
═══════════════════════════════════════════ */
function mostraLoading(titolo, sub) {
  document.getElementById('content').innerHTML =
    `<div class="loading"><div class="spin"></div><div class="lt">${titolo}</div><div class="ls">${sub}</div></div>`;
}

/* ═══════════════════════════════════════════
   AVVIO
═══════════════════════════════════════════ */
window.addEventListener('load', () => {
  // Prova GPS silenzioso all'avvio
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        uLat = pos.coords.latitude;
        uLng = pos.coords.longitude;
        cercaLat = uLat; cercaLng = uLng;
        raggio = 30;
        caricaDati();
      },
      () => caricaDati(), // se nega il GPS, carica comunque
      {timeout:3000}
    );
  } else {
    caricaDati();
  }
});
</script>
