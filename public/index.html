<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prezzi Carburanti Italia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --blu:#1565C0;--blu-bg:#E3F2FD;
  --verde:#1B7E3B;--verde-bg:#E8F5E9;
  --arancio:#D84315;
  --rosso:#B71C1C;
  --oro:#F9A825;--oro-bg:#FFF8E1;
  --grigio:#F4F4F4;--bordo:#E0E0E0;
  --testo:#1A1A1A;--muted:#6B6B6B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--grigio);color:var(--testo);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.hdr{background:var(--blu);color:white;padding:12px 16px 8px;display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:10px;}
.hdr-title{flex:1;font-size:16px;font-weight:700;}
.hdr-ts{font-size:10px;opacity:.75;white-space:nowrap;}
.search-row{display:flex;gap:8px;position:relative;}
.sbox{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:22px;padding:0 14px;gap:7px;}
.sbox input{background:transparent;border:none;outline:none;color:white;font-size:14px;padding:8px 0;width:100%;}
.sbox input::placeholder{color:rgba(255,255,255,.5);}
.btn-geo{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:22px;color:white;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-geo.on{background:rgba(105,240,174,.25);border-color:rgba(105,240,174,.5);}
.suggerimenti{position:absolute;top:calc(100%+6px);left:0;right:72px;background:white;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:9999;display:none;overflow:hidden;}
.sugg-item{padding:11px 14px;font-size:13px;color:var(--testo);cursor:pointer;border-bottom:1px solid var(--bordo);}
.sugg-item:last-child{border-bottom:none;}
.sugg-item:active{background:#f0f4ff;}

/* FUEL */
.fuels{display:flex;overflow-x:auto;scrollbar-width:none;background:white;border-bottom:1px solid var(--bordo);flex-shrink:0;}
.fuels::-webkit-scrollbar{display:none;}
.ftab{padding:10px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border:none;border-bottom:3px solid transparent;background:none;flex-shrink:0;}
.ftab.on{color:var(--blu);border-bottom-color:var(--blu);}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:white;border-bottom:1px solid var(--bordo);flex-shrink:0;}
.st{padding:8px 6px;text-align:center;border-right:1px solid var(--bordo);}
.st:last-child{border-right:none;}
.st-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.st-v{font-size:17px;font-weight:800;line-height:1.1;}
.st-v.g{color:var(--verde)}.st-v.a{color:var(--arancio)}.st-v.b{color:var(--blu)}
.st-s{font-size:9px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* TOOLBAR ORDINAMENTO */
.toolbar{display:flex;align-items:center;padding:7px 12px;background:white;border-bottom:1px solid var(--bordo);flex-shrink:0;gap:8px;}
.toolbar-label{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.sort-pills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;}
.sort-pills::-webkit-scrollbar{display:none;}
.spill{font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;border:1.5px solid var(--bordo);background:white;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.spill.on{background:var(--blu);color:white;border-color:var(--blu);}
.spill:active{opacity:.7;}

/* VIEW TABS */
.vtabs{display:flex;background:white;border-bottom:1px solid var(--bordo);flex-shrink:0;}
.vtab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;justify-content:center;gap:4px;}
.vtab.on{color:var(--blu);border-bottom-color:var(--blu);}

/* PANNELLI */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;position:relative;}
#pannello-lista{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;display:flex;flex-direction:column;gap:6px;background:var(--grigio);}
#pannello-lista.hidden{display:none;}
#pannello-mappa{position:absolute;inset:0;background:#e8e0d8;}
#pannello-mappa.hidden{display:none;}
#map{width:100%;height:100%;}

/* CARD BASE */
.card{background:white;border-radius:14px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;border:1.5px solid transparent;}
.card:active{opacity:.75;}
.card.sel{border-color:var(--blu);}

/* CARD MIGLIOR PREZZO — solo trofeo, niente numeri */
.card.top1{
  border-color:var(--oro);
  box-shadow:0 3px 12px rgba(249,168,37,.18);
}
.top1-banner{
  display:flex;align-items:center;gap:6px;
  background:var(--oro);color:white;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  padding:5px 14px;border-radius:10px 10px 0 0;
  margin:-12px -14px 12px;
}

.ctop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px;}
.cinfo{flex:1;min-width:0;}
.cgest{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.caddr{font-size:11px;color:var(--muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdist{font-size:11px;color:var(--blu);font-weight:600;margin-top:2px;}
.cprice{text-align:right;flex-shrink:0;}
.cnum{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px;}
.cnum.g{color:var(--verde)}.cnum.a{color:var(--arancio)}.cnum.r{color:var(--rosso)}
.cunit{font-size:10px;color:var(--muted);}
.cbot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.b-self{background:var(--blu-bg);color:var(--blu);}
.b-serv{background:#FFF8E1;color:#E65100;}
.b-save{background:var(--verde-bg);color:var(--verde);margin-left:auto;}
.b-date{background:var(--grigio);color:var(--muted);}

/* POPUP MAPPA */
.leaflet-popup-content-wrapper{border-radius:14px!important;padding:0!important;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.22)!important;}
.leaflet-popup-content{margin:0!important;width:auto!important;}
.pu{padding:14px 16px;min-width:190px;}
.pu-p{font-size:24px;font-weight:800;color:var(--verde);line-height:1;}
.pu-meta{font-size:10px;color:var(--muted);margin-bottom:6px;}
.pu-n{font-size:14px;font-weight:700;margin-bottom:2px;}
.pu-a{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:10px;}
.pu-btn{width:100%;background:var(--blu);color:white;border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;text-align:center;}
.spin{width:34px;height:34px;border:3px solid var(--bordo);border-top-color:var(--blu);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.lt{font-size:15px;font-weight:700;}
.ls{font-size:12px;color:var(--muted);line-height:1.6;}
.btn-r{background:var(--blu);color:white;border:none;border-radius:22px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:white;padding:9px 20px;border-radius:22px;font-size:13px;font-weight:500;z-index:99999;transition:transform .22s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:92vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ERR */
.errbar{background:#FFF3E0;border-bottom:1px solid #FFE0B2;padding:4px 14px;font-size:11px;color:#E65100;display:none;align-items:center;gap:5px;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-top">
      <span style="font-size:20px">⛽</span>
      <span class="hdr-title">Prezzi Carburanti</span>
      <span class="hdr-ts" id="hdr-ts">MIMIT · Italia</span>
    </div>
    <div class="search-row" id="search-row">
      <div class="sbox">
        <span style="font-size:14px;opacity:.6">🔍</span>
        <input type="text" id="sinp" placeholder="Cerca città…"
          autocomplete="off" oninput="onInput()" onkeydown="onKey(event)">
      </div>
      <button class="btn-geo" id="btn-geo" onclick="geoLocate()">📍 GPS</button>
      <div class="suggerimenti" id="suggerimenti"></div>
    </div>
  </div>

  <div class="fuels">
    <button class="ftab on" data-fuel="gasolio" onclick="setFuel(this)">🛢 DIESEL</button>
    <button class="ftab" data-fuel="benzina" onclick="setFuel(this)">⛽ BENZINA 95</button>
    <button class="ftab" data-fuel="benzina98" onclick="setFuel(this)">🔥 BENZINA 98</button>
    <button class="ftab" data-fuel="gpl" onclick="setFuel(this)">💧 GPL</button>
    <button class="ftab" data-fuel="metano" onclick="setFuel(this)">💨 METANO</button>
  </div>

  <div class="stats">
    <div class="st">
      <div class="st-l">Prezzo minimo</div>
      <div class="st-v g" id="smin">—</div>
      <div class="st-s" id="smin-w">—</div>
    </div>
    <div class="st">
      <div class="st-l">Prezzo medio</div>
      <div class="st-v a" id="savg">—</div>
      <div class="st-s" id="sfuel">—</div>
    </div>
    <div class="st">
      <div class="st-l">Stazioni trovate</div>
      <div class="st-v b" id="scnt">—</div>
      <div class="st-s" id="sraggio">—</div>
    </div>
  </div>

  <div class="toolbar" id="toolbar">
    <span class="toolbar-label">Ordina:</span>
    <div class="sort-pills">
      <button class="spill on" data-sort="prezzo-asc"  onclick="setSort(this)">💰 Prezzo ↑</button>
      <button class="spill"    data-sort="prezzo-desc" onclick="setSort(this)">💰 Prezzo ↓</button>
      <button class="spill"    data-sort="distanza"    onclick="setSort(this)">📍 Distanza</button>
      <button class="spill"    data-sort="gestore"     onclick="setSort(this)">🏪 Gestore A-Z</button>
    </div>
  </div>

  <div class="vtabs">
    <button class="vtab on" id="vt-lista" onclick="setView('lista')">📋 Lista prezzi</button>
    <button class="vtab"    id="vt-mappa" onclick="setView('mappa')">🗺️ Mappa</button>
  </div>

  <div class="errbar" id="errbar">⚠️ <span id="err-txt"></span></div>

  <div class="content">
    <div id="pannello-lista">
      <div class="loading">
        <div class="spin"></div>
        <div class="lt">Rilevamento posizione…</div>
        <div class="ls">Cerco le stazioni più vicine</div>
      </div>
    </div>
    <div id="pannello-mappa" class="hidden">
      <div id="map"></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ══ CONFIG ══════════════════════════════════════════ */
const BACKEND   = 'https://carburanti-api.onrender.com';
const NOMINATIM = 'https://nominatim.openstreetmap.org/search';
const RAGGIO    = 10;
const FNOMI     = {gasolio:'Diesel',benzina:'Benzina 95',benzina98:'Benzina 98',gpl:'GPL',metano:'Metano'};

// Gestori da non mostrare (URL o nomi non validi)
const GESTORI_ESCLUDI = ['prezzibenzina','gestori.','www.','http','.it','.com'];
function gestoreOk(g){
  if(!g||g==='—') return false;
  const gl=g.toLowerCase();
  return !GESTORI_ESCLUDI.some(e=>gl.includes(e));
}
function nomeGestore(g){
  return gestoreOk(g) ? g : 'Indipendente';
}

/* ══ STATO ═══════════════════════════════════════════ */
let ALL=[], FILT=[];
let fuel='gasolio', sortMode='prezzo-asc';
let uLat=null, uLng=null, cLat=null, cLng=null, raggio=RAGGIO;
let selId=null, view='lista', tentativo=0;
let mappa=null, mLayer=null, uMark=null;

/* ══ MAPPA — inizializzata UNA VOLTA SOLA ════════════ */
function initMappa(){
  if(mappa) return;
  mappa=L.map('map',{zoomControl:true,preferCanvas:true,renderer:L.canvas({padding:0.4}),maxZoom:18})
    .setView([41.9,12.5],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://openstreetmap.org">OSM</a>',
    maxZoom:18,keepBuffer:2,updateWhenIdle:false,updateWhenZooming:false,
  }).addTo(mappa);
  mLayer=L.layerGroup().addTo(mappa);
}

/* ══ UTILS ═══════════════════════════════════════════ */
const fp=p=>p?p.toFixed(3).replace('.',','):'—';
function hav(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function colC(p,mn,mx){const t=(p-mn)/(mx-mn+.001);return t<.25?'g':t<.65?'a':'r';}
function colH(p,mn,mx){const t=(p-mn)/(mx-mn+.001);return t<.25?'#1B7E3B':t<.65?'#D84315':'#B71C1C';}

let _tt;
function toast(m,d=2800){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),d);}
function setErr(m){const b=document.getElementById('errbar');if(m){b.style.display='flex';document.getElementById('err-txt').textContent=m;}else b.style.display='none';}

/* ══ MATCH CARBURANTE ════════════════════════════════ */
function matchFuel(carburante,fuel){
  const c=(carburante||'').toLowerCase().trim();
  if(!c) return false;
  switch(fuel){
    case 'gasolio':   return (c==='gasolio'||c.includes('diesel'))&&!c.includes('spec')&&!c.includes('riscald');
    case 'benzina':   return (c==='benzina'||c==='benzina 95')&&!c.includes('98')&&!c.includes('spec')&&!c.includes('premium')&&!c.includes('super');
    case 'benzina98': return c.includes('98')||c.includes('premium')||c.includes('super')||c==='benzina speciale';
    case 'gpl':       return c==='gpl'||c.includes('gpl')||c.includes('liquefatt');
    case 'metano':    return c==='metano'||c.includes('metano')||c.includes('cng');
    default: return true;
  }
}

/* ══ CARICA ══════════════════════════════════════════ */
async function carica(){
  tentativo++;
  if(tentativo===1&&view==='lista'){
    document.getElementById('pannello-lista').innerHTML=
      `<div class="loading"><div class="spin"></div>
       <div class="lt">Caricamento prezzi…</div>
       <div class="ls">${cLat?'Stazioni entro '+raggio+' km':'Dati MIMIT aggiornati'}</div></div>`;
  }
  try{
    const p=new URLSearchParams({limit:400});
    const fs={gasolio:'Gasolio',benzina:'Benzina',benzina98:'Benzina',gpl:'GPL',metano:'Metano'};
    p.set('carburante',fs[fuel]||fuel);
    if(cLat&&cLng){p.set('lat',cLat.toFixed(6));p.set('lng',cLng.toFixed(6));p.set('raggio',raggio);}

    const res=await fetch(`${BACKEND}/api/stazioni-con-prezzi?${p}`,{signal:AbortSignal.timeout(30000)});
    if(res.status===503){
      if(tentativo<4){
        document.getElementById('pannello-lista').innerHTML=
          `<div class="loading"><div class="spin"></div><div class="lt">Server in avvio…</div><div class="ls">Tentativo ${tentativo}/4 — attendo 25s</div></div>`;
        setTimeout(carica,25000);
      }else usaCampione();
      return;
    }
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    if(!j.ok||!j.data?.length) throw new Error('vuoto');

    ALL=j.data.map((s,i)=>({
      id:s.id||i,
      prezzo:parseFloat(s.prezzo)||0,
      carburante:(s.carburante||'').trim(),
      self:s.isSelf||false,
      dtCom:(s.dtCom||'').split(' ')[0]||'',
      // Applica filtro gestore anche lato client come sicurezza aggiuntiva
      gestore:nomeGestore(s.gestore),
      indirizzo:s.indirizzo||'—',
      comune:s.comune||'',
      lat:parseFloat(s.latitudine)||0,
      lng:parseFloat(s.longitudine)||0,
      dist:s.distanza!=null?parseFloat(s.distanza):null,
    })).filter(s=>s.prezzo>0.1&&s.prezzo<6);

    tentativo=0; setErr('');

    if(j.aggiornatoAlle){
      const d=new Date(j.aggiornatoAlle);
      document.getElementById('hdr-ts').textContent=
        d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})+' '+
        d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    }
    applicaFiltri();
  }catch(e){
    console.warn('Errore',tentativo,e.message);
    if(tentativo<3) setTimeout(carica,20000);
    else{setErr('Server non raggiungibile — dati dimostrativi');usaCampione();}
  }
}

/* ══ CAMPIONE ════════════════════════════════════════ */
function usaCampione(){
  const PP={gasolio:[1.849,1.869,1.894,1.919,1.939,1.959,1.979,1.999,2.049,2.099],benzina:[1.749,1.789,1.819,1.849,1.879,1.919,1.969,2.009,2.069],benzina98:[1.889,1.949,1.989,2.049,2.099,2.159],gpl:[0.689,0.719,0.749,0.769,0.789],metano:[1.199,1.259,1.319,1.369]};
  const CL={gasolio:'Gasolio',benzina:'Benzina',benzina98:'Benzina 98',gpl:'GPL',metano:'Metano'};
  const G=['ENI','Q8','IP','Shell','Tamoil','TotalEnergies','Esso','API-IP','Kuwait','Agip'];
  const V=['Via Roma','Corso Italia','Via Appia','Viale Europa','Via Po','Via Nazionale'];
  const pp=PP[fuel]||PP.gasolio;
  const bLa=cLat||41.9,bLo=cLng||12.5;
  ALL=[];
  for(let i=0;i<60;i++){
    const la=bLa+(Math.random()-.5)*.1,lo=bLo+(Math.random()-.5)*.12;
    ALL.push({id:i,prezzo:pp[i%pp.length],carburante:CL[fuel]||fuel,self:i%3!==0,
      dtCom:'12/04/2026',gestore:G[i%G.length],indirizzo:V[i%V.length]+' '+(i*7+1),
      comune:'Area',lat:la,lng:lo,dist:hav(bLa,bLo,la,lo)});
  }
  applicaFiltri();
}

/* ══ FILTRI ══════════════════════════════════════════ */
function applicaFiltri(){
  let f=ALL.filter(s=>matchFuel(s.carburante,fuel));
  if(f.length<3) f=[...ALL];

  if(cLat&&cLng){
    f=f.map(s=>({...s,dist:(s.lat&&s.lng)?hav(cLat,cLng,s.lat,s.lng):null}))
       .filter(s=>s.dist===null||s.dist<=raggio);
    if(f.length<3){
      const r2=raggio*4;
      f=ALL.filter(s=>{if(!s.lat||!s.lng)return false;const d=hav(cLat,cLng,s.lat,s.lng);s.dist=d;return d<=r2;});
      if(f.length>0) setErr(`Poche stazioni entro ${raggio}km — mostro entro ${raggio*4}km`);
    }
  }

  f=applicaSort(f);
  FILT=f;
  aggStats();
  if(view==='lista') renderLista(); else aggMarkers();
}

function applicaSort(lista){
  switch(sortMode){
    case 'prezzo-asc':  return [...lista].sort((a,b)=>a.prezzo-b.prezzo);
    case 'prezzo-desc': return [...lista].sort((a,b)=>b.prezzo-a.prezzo);
    case 'distanza':    return [...lista].sort((a,b)=>(a.dist??999)-(b.dist??999));
    case 'gestore':     return [...lista].sort((a,b)=>a.gestore.localeCompare(b.gestore));
    default:            return [...lista].sort((a,b)=>a.prezzo-b.prezzo);
  }
}

/* ══ STATS ═══════════════════════════════════════════ */
function aggStats(){
  const pp=FILT.map(s=>s.prezzo).filter(p=>p>0);
  if(!pp.length) return;
  const mn=Math.min(...pp),avg=pp.reduce((a,b)=>a+b,0)/pp.length;
  document.getElementById('smin').textContent='€'+fp(mn);
  document.getElementById('savg').textContent='€'+fp(avg);
  document.getElementById('scnt').textContent=FILT.length;
  document.getElementById('smin-w').textContent=(FILT.find(s=>s.prezzo===mn)?.gestore||'—').substring(0,14);
  document.getElementById('sfuel').textContent=FNOMI[fuel]||fuel;
  document.getElementById('sraggio').textContent=cLat?'entro '+raggio+' km':'tutta Italia';
}

/* ══ LISTA ═══════════════════════════════════════════ */
function renderLista(){
  const pl=document.getElementById('pannello-lista');
  if(!FILT.length){
    pl.innerHTML=`<div class="loading"><div class="lt">Nessuna stazione trovata</div>
      <div class="ls">Prova a cercare una città</div>
      <button class="btn-r" onclick="raggio=50;applicaFiltri()">Allarga a 50 km</button></div>`;
    return;
  }

  const prezzoMin=Math.min(...FILT.map(s=>s.prezzo));
  const prezzoMax=Math.max(...FILT.map(s=>s.prezzo));
  const idMin=FILT.find(s=>s.prezzo===prezzoMin)?.id;

  const frag=document.createDocumentFragment();
  FILT.slice(0,80).forEach(s=>{
    const c=colC(s.prezzo,prezzoMin,prezzoMax);
    const isMigliore=s.id===idMin;
    const sel=selId===s.id;
    const risparmio=((prezzoMax-s.prezzo)*40).toFixed(2);

    const div=document.createElement('div');
    div.className='card'+(isMigliore?' top1':'')+(sel?' sel':'');

    div.innerHTML=`
      ${isMigliore?`<div class="top1-banner">🏆 MIGLIOR PREZZO DELL'AREA</div>`:''}
      <div class="ctop">
        <div class="cinfo">
          <div class="cgest">${s.gestore}</div>
          <div class="caddr">${s.indirizzo}</div>
          ${s.dist!=null?`<div class="cdist">📍 ${s.dist.toFixed(1)} km di distanza</div>`:''}
        </div>
        <div class="cprice">
          <div class="cnum ${c}">€${fp(s.prezzo)}</div>
          <div class="cunit">/litro</div>
        </div>
      </div>
      <div class="cbot">
        <span class="badge ${s.self?'b-self':'b-serv'}">${s.self?'Self-service':'Servito'}</span>
        ${s.dtCom?`<span class="badge b-date">${s.dtCom}</span>`:''}
        ${!isMigliore&&parseFloat(risparmio)>0.05?`<span class="badge b-save">Risparmi €${risparmio}/40L</span>`:''}
        ${isMigliore?`<span class="badge b-save">Risparmio max €${((prezzoMax-prezzoMin)*40).toFixed(2)}/40L</span>`:''}
      </div>`;

    div.addEventListener('click',()=>selCard(s.id));
    frag.appendChild(div);
  });

  pl.innerHTML='';
  pl.appendChild(frag);
}

/* ══ MAPPA ═══════════════════════════════════════════ */
function aggMarkers(){
  if(!mappa||!mLayer) return;
  mLayer.clearLayers();
  if(uLat&&uLng){
    if(uMark) try{mappa.removeLayer(uMark);}catch(e){}
    uMark=L.circleMarker([uLat,uLng],{radius:9,color:'white',fillColor:'#1565C0',fillOpacity:1,weight:3})
      .addTo(mappa).bindPopup('<b>📍 La tua posizione</b>');
  }
  const vis=FILT.filter(s=>s.lat&&s.lng&&Math.abs(s.lat)>0.5);
  if(!vis.length) return;
  const mn=Math.min(...vis.map(s=>s.prezzo)),mx=Math.max(...vis.map(s=>s.prezzo));
  vis.slice(0,150).forEach(s=>{
    const c=colH(s.prezzo,mn,mx),sel=selId===s.id;
    const ico=L.divIcon({
      className:'',
      html:`<div style="background:white;border:2.5px solid ${c};color:${c};font-size:${sel?13:10}px;font-weight:800;padding:2px 5px;border-radius:6px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.2);${sel?'transform:scale(1.25);':''}">€${fp(s.prezzo)}</div>`,
      iconSize:[52,22],iconAnchor:[26,22],
    });
    L.marker([s.lat,s.lng],{icon:ico,zIndexOffset:sel?1000:0}).addTo(mLayer)
      .bindPopup(`<div class="pu">
        <div class="pu-p">€${fp(s.prezzo)}</div>
        <div class="pu-meta">${FNOMI[fuel]||fuel}/L · ${s.self?'Self':'Servito'}${s.dist!=null?' · '+s.dist.toFixed(1)+' km':''}</div>
        <div class="pu-n">${s.gestore}</div>
        <div class="pu-a">${s.indirizzo}</div>
        <button class="pu-btn" onclick="window.__s('${s.id}')">↗ Naviga con Google Maps</button>
      </div>`,{maxWidth:220,autoPan:true});
  });
}
window.__s=function(id){selCard(id);if(mappa)mappa.closePopup();};

/* ══ SELEZIONE ═══════════════════════════════════════ */
function selCard(id){
  const s=FILT.find(x=>String(x.id)===String(id));
  if(!s) return;
  selId=s.id;
  if(view==='lista'){
    renderLista();
    setTimeout(()=>{
      const idx=FILT.findIndex(x=>String(x.id)===String(id));
      const cards=document.querySelectorAll('#pannello-lista .card');
      if(cards[idx]) cards[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
    },30);
  }else{
    if(s.lat&&s.lng) mappa.setView([s.lat,s.lng],15);
    aggMarkers();
  }
  toast(s.gestore+' · €'+fp(s.prezzo)+'/L');
  setTimeout(()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=driving`,'_blank'),900);
}

/* ══ ORDINAMENTO ═════════════════════════════════════ */
function setSort(btn){
  document.querySelectorAll('.spill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  sortMode=btn.dataset.sort;
  if(sortMode==='distanza'&&!cLat&&!uLat){toast('📍 Attiva il GPS o cerca una città per ordinare per distanza');return;}
  applicaFiltri();
}

/* ══ VIEW ════════════════════════════════════════════ */
function setView(v){
  view=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('on'));
  document.getElementById('vt-'+v).classList.add('on');
  document.getElementById('toolbar').style.display=v==='lista'?'flex':'none';
  if(v==='mappa'){
    document.getElementById('pannello-lista').classList.add('hidden');
    document.getElementById('pannello-mappa').classList.remove('hidden');
    initMappa();
    mappa.setView([cLat||uLat||41.9,cLng||uLng||12.5],(cLat||uLat)?13:6);
    setTimeout(()=>{mappa.invalidateSize();aggMarkers();},60);
  }else{
    document.getElementById('pannello-mappa').classList.add('hidden');
    document.getElementById('pannello-lista').classList.remove('hidden');
    renderLista();
  }
}

/* ══ FUEL ════════════════════════════════════════════ */
function setFuel(btn){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on'); fuel=btn.dataset.fuel;
  selId=null; tentativo=0; carica();
}

/* ══ GPS ═════════════════════════════════════════════ */
async function richiediGPS(){
  if(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform()){
    try{
      const {Geolocation}=window.Capacitor.Plugins;
      if(Geolocation){
        const pos=await Geolocation.getCurrentPosition({enableHighAccuracy:true,timeout:10000});
        return {lat:pos.coords.latitude,lng:pos.coords.longitude};
      }
    }catch(e){
      if(e.message?.includes('disabled')||e.code==='LOCATION_SERVICES_NOT_ENABLED')
        toast('⚠️ GPS disattivato — attivalo in Impostazioni → Posizione',5000);
      else if(e.message?.includes('denied')||e.code==='PERMISSION_DENIED')
        toast('⚠️ Permesso GPS negato — Impostazioni → App → Carburanti → Permessi',5000);
      return null;
    }
  }
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      err=>{
        if(err.code===1) toast('⚠️ GPS negato — Impostazioni → App → Carburanti → Permessi',5000);
        else if(err.code===2) toast('⚠️ GPS non disponibile — attiva la posizione',4000);
        else toast('⚠️ GPS lento — riprova');
        resolve(null);
      },
      {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
    );
  });
}

async function avviaGPS(){
  const pos=await richiediGPS();
  if(pos){
    uLat=pos.lat;uLng=pos.lng;cLat=uLat;cLng=uLng;raggio=RAGGIO;
    document.getElementById('btn-geo').classList.add('on');
    document.getElementById('btn-geo').textContent='📍 '+raggio+'km';
  }
  carica();
}

async function geoLocate(){
  toast('📍 Rilevamento GPS…',6000);
  const pos=await richiediGPS();
  if(pos){
    uLat=pos.lat;uLng=pos.lng;cLat=uLat;cLng=uLng;raggio=RAGGIO;
    document.getElementById('btn-geo').classList.add('on');
    document.getElementById('btn-geo').textContent='📍 '+raggio+'km';
    document.getElementById('sinp').value='';
    toast('✅ Posizione trovata!');
    if(mappa&&view==='mappa') mappa.setView([uLat,uLng],13);
    tentativo=0; carica();
  }
}

/* ══ RICERCA CITTÀ ═══════════════════════════════════ */
let _st;
function onInput(){clearTimeout(_st);const q=document.getElementById('sinp').value.trim();if(q.length<2){chiudiS();return;}_st=setTimeout(()=>cercaS(q),300);}
function onKey(e){if(e.key==='Enter'){chiudiS();const q=document.getElementById('sinp').value.trim();if(q)cercaEnter(q);}if(e.key==='Escape')chiudiS();}
async function cercaS(q){try{const r=await fetch(`${NOMINATIM}?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=it&accept-language=it&addressdetails=1`,{headers:{'User-Agent':'CarburantiApp/3.0'}});mostraS(await r.json());}catch(e){chiudiS();}}
function mostraS(d){
  const b=document.getElementById('suggerimenti');
  if(!d||!d.length){chiudiS();return;}
  b.style.display='block';
  b.innerHTML=d.map(x=>{const a=x.address||{};const nome=[a.city||a.town||a.village||a.municipality||x.display_name.split(',')[0],a.state||a.county].filter(Boolean).join(', ');return`<div class="sugg-item" onclick="selS(${x.lat},${x.lon},'${nome.replace(/'/g,"\\'")}')">📍 ${nome}</div>`;}).join('');
}
function chiudiS(){document.getElementById('suggerimenti').style.display='none';}
function selS(lat,lon,nome){
  cLat=parseFloat(lat);cLng=parseFloat(lon);raggio=RAGGIO;
  document.getElementById('sinp').value=nome.split(',')[0];
  chiudiS();
  document.getElementById('btn-geo').classList.remove('on');
  toast('🔍 Stazioni entro '+raggio+'km da '+nome.split(',')[0]);
  if(mappa&&view==='mappa') mappa.setView([cLat,cLng],13);
  tentativo=0; carica();
}
async function cercaEnter(q){try{const r=await fetch(`${NOMINATIM}?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=it`,{headers:{'User-Agent':'CarburantiApp/3.0'}});const d=await r.json();if(d&&d.length){const a=d[0].address||{};selS(d[0].lat,d[0].lon,a.city||a.town||a.village||d[0].display_name.split(',')[0]);}else toast('❌ Città non trovata');}catch(e){toast('❌ Errore ricerca');}}
document.addEventListener('click',e=>{if(!document.getElementById('search-row').contains(e.target))chiudiS();});

/* ══ AVVIO ═══════════════════════════════════════════ */
window.addEventListener('load',avviaGPS);
</script>
